<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accordion Shortcode Generator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 24px;
            color: #1a1a1a;
            font-size: 24px;
        }
        .items-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }
        .accordion-item {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            position: relative;
        }
        .accordion-item label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .accordion-item input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .accordion-item textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            min-height: 80px;
            resize: vertical;
            font-family: inherit;
        }
        .accordion-item input:focus,
        .accordion-item textarea:focus {
            outline: none;
            border-color: #0073aa;
            box-shadow: 0 0 0 2px rgba(0,115,170,0.2);
        }
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .item-number {
            font-weight: 700;
            font-size: 15px;
            color: #0073aa;
        }
        .btn-remove {
            background: none;
            border: none;
            color: #cc0000;
            cursor: pointer;
            font-size: 20px;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .btn-remove:hover { background: #fee; }
        .btn-add {
            background: #0073aa;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-add:hover { background: #005a87; }
        .output-section {
            margin-top: 24px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
        }
        .output-section h2 {
            font-size: 16px;
            margin-bottom: 10px;
        }
        .output-box {
            background: #f7f7f7;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 12px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
            min-height: 100px;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.5;
        }
        .btn-copy {
            margin-top: 10px;
            background: #2ea043;
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-copy:hover { background: #258a37; }
        .btn-copy.copied {
            background: #666;
        }
        .buttons-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Accordion Shortcode Generator</h1>

    <div class="items-area" id="items-area">
        <!-- items rendered here -->
    </div>

    <div class="buttons-row">
        <button class="btn-add" onclick="addItem()">+ Add Section</button>
    </div>

    <div class="output-section">
        <h2>Generated Shortcode</h2>
        <div class="output-box" id="output"></div>
        <button class="btn-copy" id="copy-btn" onclick="copyOutput()">Copy to Clipboard</button>
    </div>
</div>

<script>
    let items = [
        { title: '', content: '' },
        { title: '', content: '' }
    ];

    function render() {
        const area = document.getElementById('items-area');
        area.innerHTML = '';
        items.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'accordion-item';
            div.innerHTML = `
                <div class="item-header">
                    <span class="item-number">Section ${i + 1}</span>
                    ${items.length > 1 ? `<button class="btn-remove" onclick="removeItem(${i})" title="Remove">&times;</button>` : ''}
                </div>
                <label>Title</label>
                <input type="text" placeholder="Enter section title..." value="${escapeAttr(item.title)}" oninput="updateItem(${i}, 'title', this.value)">
                <label>Content</label>
                <textarea placeholder="Enter section content..." oninput="updateItem(${i}, 'content', this.value)">${escapeHtml(item.content)}</textarea>
            `;
            area.appendChild(div);
        });
        updateOutput();
    }

    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function escapeAttr(str) {
        return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function addItem() {
        items.push({ title: '', content: '' });
        render();
        // focus the new title input
        const inputs = document.querySelectorAll('.accordion-item input[type="text"]');
        if (inputs.length) inputs[inputs.length - 1].focus();
    }

    function removeItem(index) {
        items.splice(index, 1);
        render();
    }

    function updateItem(index, field, value) {
        items[index][field] = value;
        updateOutput();
    }

    function updateOutput() {
        let lines = ['[bhfe_accordion]', ''];
        items.forEach((item) => {
            const title = item.title || 'Section Title';
            const content = item.content || 'Content goes here';
            lines.push(`[bhfe_accordion_item title="${title}"]`);
            lines.push('');
            lines.push(content);
            lines.push('');
            lines.push('[/bhfe_accordion_item]');
            lines.push('');
        });
        lines.push('[/bhfe_accordion]');
        document.getElementById('output').textContent = lines.join('\n');
    }

    function copyOutput() {
        const text = document.getElementById('output').textContent;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('copy-btn');
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = 'Copy to Clipboard';
                btn.classList.remove('copied');
            }, 2000);
        });
    }

    render();
</script>

</body>
</html>
